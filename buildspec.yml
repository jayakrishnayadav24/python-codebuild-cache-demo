version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "=== Installing dependencies ==="
      - date
      - pip install --no-deps -r requirements-heavy.txt
      - pip install -r requirements.txt
      - echo "=== All deps installed ==="
      - date
  pre_build:
    commands:
      - echo "Pre-build started on `date`"
      - python --version
      - pip list | wc -l
  build:
    commands:
      - echo "Build started on `date`"
      - pytest tests/ --tb=short || true
  post_build:
    commands:
      - echo "Build completed on `date`"

artifacts:
  files:
    - '**/*'
  exclude-paths:
    - '.git/**/*'
    - '__pycache__/**/*'
    - '*.pyc'

cache:
  paths:
    - '/root/.cache/pip/**/*'
